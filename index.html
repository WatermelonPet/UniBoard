<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiteBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --bg:       #06060f;
  --sb:       #0c0c20;
  --tb:       #080816;
  --panel:    #111128;
  --border:   #1c1c3c;
  --hover:    #252550;
  --accent:   #6c6fff;
  --cyan:     #00d4ff;
  --text:     #c2c2e0;
  --muted:    #383860;
  --success:  #2db67d;
  --warn:     #e0b840;
  --danger:   #e04040;
  --font:     'Syne', sans-serif;
  --mono:     'DM Mono', monospace;
  --sb-w:     216px;
  --tb-h:     50px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
}

/* Scrollbars */
::-webkit-scrollbar        { width: 5px; height: 5px; }
::-webkit-scrollbar-track  { background: transparent; }
::-webkit-scrollbar-thumb  { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Topbar ─────────────────────────────────────────────────────────────────── */
#topbar {
  height: var(--tb-h);
  background: var(--tb);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  flex-shrink: 0;
  z-index: 200;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .04em;
  white-space: nowrap;
  padding-right: 6px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.logo-icon {
  width: 22px; height: 22px;
  background: var(--accent);
  border-radius: 5px;
  display: inline-block;
  position: relative;
}
.logo-icon::after {
  content: '';
  position: absolute;
  inset: 4px;
  background: var(--tb);
  border-radius: 2px;
}

/* Tab strip */
#tab-wrap {
  flex: 1;
  min-width: 0;
  overflow-x: auto;
  display: flex;
  align-items: center;
  gap: 3px;
  padding-bottom: 1px;
}
#tab-wrap::-webkit-scrollbar { height: 2px; }

.tab-btn {
  background: #12122a;
  border: 1px solid var(--border);
  color: #8888aa;
  font: 500 12px var(--font);
  padding: 4px 13px;
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
  flex-shrink: 0;
  letter-spacing: .02em;
}
.tab-btn:hover  { background: var(--hover); color: var(--text); }
.tab-btn.active { background: #222260; border-color: var(--accent); color: #fff; }

/* Topbar buttons */
.tb-btn {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  font: 500 12px var(--font);
  padding: 5px 11px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, opacity .12s;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
  letter-spacing: .02em;
}
.tb-btn:hover    { background: var(--hover); }
.tb-btn:disabled { opacity: .28; cursor: default; pointer-events: none; }

.tb-btn.public  { background: #0d3320; border-color: #1a5e38; color: #4de09a; }
.tb-btn.public:hover { background: #0f3d26; }
.tb-btn.private { background: #2e2a0a; border-color: #55500f; color: #d4c43a; }
.tb-btn.private:hover { background: #38340d; }

.vsep {
  width: 1px; height: 26px;
  background: var(--border);
  flex-shrink: 0; margin: 0 2px;
}

/* Connection indicator */
#conn-dot {
  font: 400 10px var(--mono);
  white-space: nowrap; flex-shrink: 0;
  padding: 0 4px; letter-spacing: .04em;
  transition: color .3s;
}
#conn-dot.online  { color: var(--success); }
#conn-dot.offline { color: var(--danger); }
#conn-dot.pending { color: var(--warn); }

/* ── Main layout ────────────────────────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Sidebar ────────────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sb-w);
  background: var(--sb);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 10px 10px 14px;
  gap: 2px;
  overflow-y: auto;
  flex-shrink: 0;
}

.sec-lbl {
  font: 600 9px var(--mono);
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin: 10px 0 4px;
}
.sec-lbl:first-child { margin-top: 2px; }

/* Tool buttons */
.tool-btn {
  width: 100%;
  text-align: left;
  background: #0f0f28;
  border: 1px solid var(--border);
  color: var(--text);
  font: 500 13px var(--font);
  padding: 9px 12px;
  border-radius: 7px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  display: flex; align-items: center; gap: 9px;
  margin-bottom: 3px;
}
.tool-btn:hover  { background: var(--hover); }
.tool-btn.active { background: #202064; border-color: var(--accent); color: #fff; }

/* Slider row */
.slider-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font: 400 11px var(--mono);
  color: var(--muted);
  margin-bottom: 5px;
}
input[type=range] {
  width: 100%;
  accent-color: var(--accent);
  cursor: pointer;
  height: 4px;
  margin-bottom: 2px;
}

/* Color wheel */
#colorWheel {
  display: block;
  margin: 6px auto 2px;
  cursor: crosshair;
  border-radius: 50%;
  /* subtle glow */
  filter: drop-shadow(0 0 6px #0008);
}

/* Color preview swatch */
#color-preview {
  width: 100%;
  height: 22px;
  border-radius: 5px;
  border: 1px solid var(--border);
  margin: 6px 0 2px;
  transition: background .08s;
}

/* Recent colors */
#recent-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 3px;
  min-height: 24px;
}
.swatch {
  aspect-ratio: 1;
  border-radius: 4px;
  border: 1px solid #ffffff18;
  cursor: pointer;
  transition: transform .1s, border-color .1s, box-shadow .1s;
}
.swatch:hover {
  transform: scale(1.18);
  border-color: #fff6;
  box-shadow: 0 2px 6px #0006;
}

/* Clear button */
#btn-clear {
  width: 100%;
  margin-top: 12px;
  background: #220a0a;
  border: 1px solid #3e1414;
  color: #cc6666;
  font: 500 13px var(--font);
  padding: 9px;
  border-radius: 7px;
  cursor: pointer;
  transition: background .12s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
#btn-clear:hover { background: #2e1010; color: #e08888; }

/* ── Canvas area ────────────────────────────────────────────────────────────── */
#canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
}

#canvas-wrap {
  flex: 1;
  overflow: auto;
  background: #030309;
  background-image:
    radial-gradient(circle at 20% 20%, #0e0e2208 0, transparent 60%),
    radial-gradient(circle at 80% 80%, #06063308 0, transparent 60%);
}

#canvas-container {
  position: relative;
  display: inline-block;
  margin: 10px;
  box-shadow: 0 4px 40px #00000088, 0 0 0 1px var(--border);
  border-radius: 1px;
}

#board {
  display: block;
  background: #fff;
}

#overlay {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

/* ── Status bar ─────────────────────────────────────────────────────────────── */
#statusbar {
  height: 24px;
  background: #08081a;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 12px;
  gap: 16px;
  flex-shrink: 0;
}
#statusbar span {
  font: 400 10px var(--mono);
  color: var(--muted);
}
#lasso-hint { color: #00d4ff99 !important; }
</style>
</head>
<body>

<!-- ════════════════════ TOPBAR ════════════════════ -->
<div id="topbar">
  <div class="logo">
    <span class="logo-icon"></span>
    WhiteBoard
  </div>

  <div id="tab-wrap"></div>

  <button class="tb-btn" id="btn-add" title="Add board">＋ New</button>
  <div class="vsep"></div>
  <button class="tb-btn" id="btn-undo" disabled title="Undo (Ctrl+Z)">↩ Undo</button>
  <button class="tb-btn" id="btn-redo" disabled title="Redo (Shift+Ctrl+Z)">↪ Redo</button>
  <div class="vsep"></div>
  <button class="tb-btn public" id="btn-vis">🌐 Public</button>
  <button class="tb-btn" id="btn-save">💾 Save PNG</button>
  <div id="conn-dot" class="pending">⬤ connecting…</div>
</div>

<!-- ════════════════════ MAIN ════════════════════ -->
<div id="main">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sec-lbl">Tools</div>
    <button class="tool-btn active" data-tool="brush">✏️  Brush</button>
    <button class="tool-btn"        data-tool="eraser">◻  Eraser</button>
    <button class="tool-btn"        data-tool="lasso">⭕  Lasso / Cut</button>

    <div class="sec-lbl">Brush Size</div>
    <div class="slider-row">
      <span>size</span><span id="size-val">5 px</span>
    </div>
    <input type="range" id="size-sl" min="1" max="80" value="5">

    <div class="sec-lbl">Color</div>
    <canvas id="colorWheel" width="166" height="166"></canvas>
    <div class="slider-row" style="margin-top:8px">
      <span>brightness</span><span id="bri-val">100%</span>
    </div>
    <input type="range" id="bri-sl" min="3" max="100" value="100">
    <div id="color-preview"></div>

    <div class="sec-lbl">Recent Colors</div>
    <div id="recent-grid"></div>

    <button id="btn-clear">🗑  Clear Board</button>
  </div>

  <!-- ── Canvas ── -->
  <div id="canvas-area">
    <div id="canvas-wrap">
      <div id="canvas-container">
        <canvas id="board" width="1500" height="900"></canvas>
        <canvas id="overlay" width="1500" height="900"></canvas>
      </div>
    </div>
    <div id="statusbar">
      <span id="lasso-hint" style="display:none">
        ⭕ Drag to move · Delete to discard · Esc to place
      </span>
      <span id="status-txt">Ready</span>
    </div>
  </div>
</div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────────────
//  Constants
// ──────────────────────────────────────────────────────────────────
const CW = 1500, CH = 900;
const MAX_UNDO = 30;
const SYNC_MS  = 1800;   // min ms between full-canvas syncs

// ──────────────────────────────────────────────────────────────────
//  DOM
// ──────────────────────────────────────────────────────────────────
const board    = document.getElementById('board');
const overlay  = document.getElementById('overlay');
const ctx      = board.getContext('2d');
const octx     = overlay.getContext('2d');
const wheelCvs = document.getElementById('colorWheel');
const wctx     = wheelCvs.getContext('2d');

// ──────────────────────────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────────────────────────
const S = {
  tool:       'brush',
  color:      '#e63946',
  brushSz:    5,
  isPublic:   true,
  brightness: 1.0,
  hue:        0.0,    // 0–1 for wheel cursor
  sat:        0.9,    // 0–1

  // Boards
  order:  ['Board 1'],
  boards: {},           // name → offscreen canvas
  active: 'Board 1',
  undoStk: {},          // name → [dataURL …]
  redoStk: {},          // name → [dataURL …]

  // Drawing
  drawing: false,
  last:    null,

  // Lasso
  lasso: {
    mode:      'idle',  // idle | drawing | dragging
    pts:       [],
    selCanvas: null,    // offscreen canvas with the cut-out
    pos:       null,    // {x,y} top-left of selection
    dragLast:  null,    // {x,y} previous drag position
  },

  recent: [],
  ws:     null,
  lastSync: 0,
};

// ──────────────────────────────────────────────────────────────────
//  Colour helpers
// ──────────────────────────────────────────────────────────────────
function hsvToRgb(h, s, v) {
  const i = Math.floor(h * 6), f = h * 6 - i;
  const p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
  let r, g, b;
  switch (i % 6) {
    case 0: r=v; g=t; b=p; break;
    case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break;
    case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break;
    case 5: r=v; g=p; b=q; break;
  }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

function rgbHex(r, g, b) {
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ──────────────────────────────────────────────────────────────────
//  Color Wheel
// ──────────────────────────────────────────────────────────────────
function drawWheel() {
  const W = wheelCvs.width, H = wheelCvs.height;
  const cx = W/2, cy = H/2, R = Math.min(cx, cy) - 3;
  const id = wctx.createImageData(W, H);
  const d  = id.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > R) continue;
      const h = ((Math.atan2(dy, dx) / (2*Math.PI)) + 1) % 1;
      const s = dist / R;
      const [r,g,b] = hsvToRgb(h, s, S.brightness);
      const i = (y*W + x)*4;
      // soft edge
      const alpha = dist > R-1.5 ? Math.round(255*(R-dist+1.5)) : 255;
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=alpha;
    }
  }
  wctx.putImageData(id, 0, 0);
  // Draw cursor ring
  const cx2 = cx + S.sat * (wheelCvs.width/2 - 4) * Math.cos(S.hue * 2*Math.PI);
  const cy2 = cy + S.sat * (wheelCvs.height/2 - 4) * Math.sin(S.hue * 2*Math.PI);
  wctx.beginPath();
  wctx.arc(cx2, cy2, 6, 0, 2*Math.PI);
  wctx.strokeStyle = 'white';
  wctx.lineWidth = 2.5;
  wctx.stroke();
  wctx.beginPath();
  wctx.arc(cx2, cy2, 6, 0, 2*Math.PI);
  wctx.strokeStyle = '#00000066';
  wctx.lineWidth = 1;
  wctx.stroke();
}

function pickWheel(e) {
  const r   = wheelCvs.getBoundingClientRect();
  const dx  = e.clientX - r.left - wheelCvs.width/2;
  const dy  = e.clientY - r.top  - wheelCvs.height/2;
  const R   = wheelCvs.width/2 - 3;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > R + 6) return;
  S.hue = ((Math.atan2(dy, dx) / (2*Math.PI)) + 1) % 1;
  S.sat = Math.min(dist / R, 1.0);
  const [r2,g,b] = hsvToRgb(S.hue, S.sat, S.brightness);
  setColor(rgbHex(r2, g, b));
  drawWheel();
}

let wheelDragging = false;
wheelCvs.addEventListener('mousedown', e => { wheelDragging=true; pickWheel(e); });
document.addEventListener('mousemove', e => { if (wheelDragging) pickWheel(e); });
document.addEventListener('mouseup',   () => { wheelDragging = false; });

document.getElementById('bri-sl').addEventListener('input', e => {
  S.brightness = e.target.value / 100;
  document.getElementById('bri-val').textContent = e.target.value + '%';
  const [r,g,b] = hsvToRgb(S.hue, S.sat, S.brightness);
  setColor(rgbHex(r, g, b));
  drawWheel();
});

function setColor(hex) {
  S.color = hex;
  document.getElementById('color-preview').style.background = hex;
  addRecentColor(hex);
}

function addRecentColor(hex) {
  if (S.recent[0] === hex) return;
  S.recent = [hex, ...S.recent.filter(c => c !== hex)].slice(0, 18);
  refreshRecent();
}

function refreshRecent() {
  const g = document.getElementById('recent-grid');
  g.innerHTML = '';
  S.recent.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = c;
    sw.title = c;
    sw.addEventListener('click', () => setColor(c));
    g.appendChild(sw);
  });
}

// ──────────────────────────────────────────────────────────────────
//  Board management
// ──────────────────────────────────────────────────────────────────
function newOffscreen() {
  const c = document.createElement('canvas');
  c.width = CW; c.height = CH;
  c.getContext('2d').fillRect(0, 0, CW, CH);   // white = default fill
  return c;
}

function initBoards() {
  const n = 'Board 1';
  S.boards[n]  = newOffscreen();
  S.undoStk[n] = [];
  S.redoStk[n] = [];
  renderBoard();
  rebuildTabs();
}

function renderBoard() {
  ctx.clearRect(0, 0, CW, CH);
  ctx.drawImage(S.boards[S.active], 0, 0);
  updateUndoBtns();
}

function snapshotToBoard() {
  const bctx = S.boards[S.active].getContext('2d');
  bctx.clearRect(0, 0, CW, CH);
  bctx.drawImage(board, 0, 0);
}

function switchBoard(name) {
  finalizeLasso(true);
  snapshotToBoard();
  S.active = name;
  if (!S.boards[name]) {
    S.boards[name]  = newOffscreen();
    S.undoStk[name] = [];
    S.redoStk[name] = [];
  }
  renderBoard();
  rebuildTabs();
}

function addBoard() {
  const name = prompt('Board name:');
  if (!name?.trim()) return;
  const n = name.trim();
  if (S.order.includes(n)) { alert('Name already exists.'); return; }
  S.order.push(n);
  S.boards[n]  = newOffscreen();
  S.undoStk[n] = [];
  S.redoStk[n] = [];
  rebuildTabs();
  switchBoard(n);
}

function rebuildTabs() {
  const w = document.getElementById('tab-wrap');
  w.innerHTML = '';
  S.order.forEach(name => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (name === S.active ? ' active' : '');
    b.textContent = name;
    b.onclick = () => switchBoard(name);
    w.appendChild(b);
  });
}

// ──────────────────────────────────────────────────────────────────
//  Undo / Redo
// ──────────────────────────────────────────────────────────────────
function pushUndo() {
  const stk = S.undoStk[S.active];
  stk.push(board.toDataURL());
  if (stk.length > MAX_UNDO) stk.shift();
  S.redoStk[S.active] = [];
  updateUndoBtns();
}

function undo() {
  const stk = S.undoStk[S.active];
  if (!stk.length) return;
  S.redoStk[S.active].push(board.toDataURL());
  restoreURL(stk.pop());
}

function redo() {
  const stk = S.redoStk[S.active];
  if (!stk.length) return;
  S.undoStk[S.active].push(board.toDataURL());
  restoreURL(stk.pop());
}

function restoreURL(url) {
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, CW, CH);
    ctx.drawImage(img, 0, 0);
    snapshotToBoard();
    updateUndoBtns();
    scheduleSync();
  };
  img.src = url;
}

function updateUndoBtns() {
  document.getElementById('btn-undo').disabled = !(S.undoStk[S.active]?.length);
  document.getElementById('btn-redo').disabled = !(S.redoStk[S.active]?.length);
}

// ──────────────────────────────────────────────────────────────────
//  Canvas coords (accounts for scroll + canvas CSS scaling)
// ──────────────────────────────────────────────────────────────────
function getPos(e) {
  const r  = board.getBoundingClientRect();
  const sx = board.width  / r.width;
  const sy = board.height / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * sx, y: (src.clientY - r.top) * sy };
}

// ──────────────────────────────────────────────────────────────────
//  Drawing
// ──────────────────────────────────────────────────────────────────
function strokeLine(c, x0, y0, x1, y1, col, sz) {
  c.save();
  c.strokeStyle = col;
  c.lineWidth   = sz;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  c.beginPath();
  c.moveTo(x0, y0);
  c.lineTo(x1, y1);
  c.stroke();
  c.restore();
}

function onPointerDown(e) {
  if (e.button !== 0) return;
  e.preventDefault();
  const pos = getPos(e);
  if (S.tool === 'lasso') { lassoDown(pos); return; }
  pushUndo();
  S.drawing = true;
  S.last = pos;
  // dot on click
  const col = S.tool === 'eraser' ? '#ffffff' : S.color;
  const sz  = S.tool === 'eraser' ? S.brushSz * 3 : S.brushSz;
  ctx.save();
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, sz/2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getPos(e);
  if (S.tool === 'lasso') { lassoMove(pos); return; }
  if (!S.drawing || !S.last) return;
  const col = S.tool === 'eraser' ? '#ffffff' : S.color;
  const sz  = S.tool === 'eraser' ? S.brushSz * 3 : S.brushSz;
  const prev = S.last;
  S.last = pos;
  strokeLine(ctx, prev.x, prev.y, pos.x, pos.y, col, sz);
  if (S.ws?.readyState === 1 && S.isPublic) {
    safeSend({ type:'draw', board_id:S.active, public:true,
               data:{x0:prev.x,y0:prev.y,x1:pos.x,y1:pos.y,col,sz} });
  }
}

function onPointerUp(e) {
  if (S.tool === 'lasso') { lassoUp(getPos(e)); return; }
  if (!S.drawing) return;
  S.drawing = false;
  S.last    = null;
  snapshotToBoard();
  scheduleSync();
}

// ──────────────────────────────────────────────────────────────────
//  Lasso / Cut tool
// ──────────────────────────────────────────────────────────────────
function lassoDown(pos) {
  if (S.lasso.mode === 'dragging') {
    if (lassoHit(pos)) {
      S.lasso.dragLast = pos;
      return;
    }
    finalizeLasso(true);
  }
  lassoReset();
  S.lasso.mode = 'drawing';
  S.lasso.pts  = [pos];
}

function lassoMove(pos) {
  if (S.lasso.mode === 'dragging' && S.lasso.dragLast) {
    const dx = pos.x - S.lasso.dragLast.x;
    const dy = pos.y - S.lasso.dragLast.y;
    S.lasso.pos.x += dx;
    S.lasso.pos.y += dy;
    S.lasso.dragLast = pos;
    drawLassoOverlay();
    return;
  }
  if (S.lasso.mode === 'drawing') {
    S.lasso.pts.push(pos);
    drawLassoPath();
  }
}

function lassoUp(pos) {
  if (S.lasso.mode === 'dragging') {
    S.lasso.dragLast = null;
    return;
  }
  if (S.lasso.mode !== 'drawing') return;
  if (S.lasso.pts.length < 6) { lassoReset(); return; }
  S.lasso.pts.push(S.lasso.pts[0]); // close
  captureSelection();
}

function lassoHit(pos) {
  const { pos: lp, selCanvas: sc } = S.lasso;
  if (!lp || !sc) return false;
  return pos.x >= lp.x && pos.x <= lp.x + sc.width &&
         pos.y >= lp.y && pos.y <= lp.y + sc.height;
}

function drawLassoPath() {
  octx.clearRect(0, 0, CW, CH);
  const pts = S.lasso.pts;
  if (pts.length < 2) return;
  octx.save();
  octx.strokeStyle = '#00d4ff';
  octx.lineWidth   = 1.5;
  octx.setLineDash([7, 4]);
  octx.lineDashOffset = -(Date.now() / 60) % 11;
  octx.fillStyle   = '#00d4ff0d';
  octx.beginPath();
  octx.moveTo(pts[0].x, pts[0].y);
  pts.slice(1).forEach(p => octx.lineTo(p.x, p.y));
  octx.closePath();
  octx.fill();
  octx.stroke();
  octx.restore();
}

function captureSelection() {
  const pts = S.lasso.pts;
  const xs  = pts.map(p => p.x), ys = pts.map(p => p.y);
  const bx  = Math.max(0,  Math.floor(Math.min(...xs)));
  const by  = Math.max(0,  Math.floor(Math.min(...ys)));
  const bx2 = Math.min(CW, Math.ceil(Math.max(...xs)));
  const by2 = Math.min(CH, Math.ceil(Math.max(...ys)));
  const bw  = bx2 - bx, bh = by2 - by;
  if (bw < 8 || bh < 8) { lassoReset(); return; }

  pushUndo();

  // Offscreen selection canvas
  const sel  = document.createElement('canvas');
  sel.width  = bw; sel.height = bh;
  const sc   = sel.getContext('2d');

  // Copy region
  sc.drawImage(board, bx, by, bw, bh, 0, 0, bw, bh);

  // Clip to polygon (destination-in mask)
  const mask = document.createElement('canvas');
  mask.width = bw; mask.height = bh;
  const mc   = mask.getContext('2d');
  mc.fillStyle = 'black';
  mc.beginPath();
  pts.forEach((p, i) => {
    if (i === 0) mc.moveTo(p.x - bx, p.y - by);
    else         mc.lineTo(p.x - bx, p.y - by);
  });
  mc.closePath();
  mc.fill();
  sc.globalCompositeOperation = 'destination-in';
  sc.drawImage(mask, 0, 0);
  sc.globalCompositeOperation = 'source-over';

  // Erase region from main canvas
  ctx.save();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  pts.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else         ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  snapshotToBoard();

  S.lasso.selCanvas = sel;
  S.lasso.pos       = { x: bx, y: by };
  S.lasso.mode      = 'dragging';
  S.lasso.dragLast  = null;
  drawLassoOverlay();
  document.getElementById('lasso-hint').style.display = 'block';
}

function drawLassoOverlay() {
  const { selCanvas: sc, pos } = S.lasso;
  if (!sc || !pos) return;
  octx.clearRect(0, 0, CW, CH);
  // Selection image
  octx.drawImage(sc, pos.x, pos.y);
  // Dashed outline
  octx.save();
  octx.strokeStyle = '#00d4ff';
  octx.lineWidth   = 1.5;
  octx.setLineDash([7, 4]);
  octx.strokeRect(pos.x + 0.5, pos.y + 0.5, sc.width - 1, sc.height - 1);
  octx.restore();
}

function finalizeLasso(apply) {
  if (S.lasso.mode === 'dragging' && apply && S.lasso.selCanvas) {
    ctx.drawImage(S.lasso.selCanvas, S.lasso.pos.x, S.lasso.pos.y);
    snapshotToBoard();
    scheduleSync();
  }
  lassoReset();
}

function lassoReset() {
  octx.clearRect(0, 0, CW, CH);
  S.lasso.mode      = 'idle';
  S.lasso.pts       = [];
  S.lasso.selCanvas = null;
  S.lasso.pos       = null;
  S.lasso.dragLast  = null;
  document.getElementById('lasso-hint').style.display = 'none';
}

// Animate lasso dashes
let lassoAnim = null;
function animateLasso() {
  if (S.lasso.mode === 'drawing') drawLassoPath();
  else if (S.lasso.mode === 'dragging') drawLassoOverlay();
  lassoAnim = requestAnimationFrame(animateLasso);
}
animateLasso();

// ──────────────────────────────────────────────────────────────────
//  WebSocket
// ──────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url   = `${proto}//${location.host}/ws`;
  setConnStatus('pending', '⬤ connecting…');
  try {
    const ws = new WebSocket(url);
    ws.onopen = () => {
      S.ws = ws;
      setConnStatus('online', `⬤ online — ${location.host}`);
      sendCanvasState(); // share current board with server
    };
    ws.onmessage = e => handleMsg(JSON.parse(e.data));
    ws.onclose   = () => {
      S.ws = null;
      setConnStatus('offline', '⬤ disconnected — retrying…');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => ws.close();
  } catch(err) {
    setConnStatus('offline', '⬤ error');
    setTimeout(connectWS, 4000);
  }
}

function setConnStatus(cls, msg) {
  const el = document.getElementById('conn-dot');
  el.className = cls;
  el.textContent = msg;
}

function safeSend(obj) {
  if (S.ws?.readyState === 1) S.ws.send(JSON.stringify(obj));
}

function scheduleSync() {
  const now = Date.now();
  if (now - S.lastSync < SYNC_MS) return;
  S.lastSync = now;
  sendCanvasState();
}

function sendCanvasState() {
  if (!S.ws || !S.isPublic) return;
  S.lastSync = Date.now();
  const url = board.toDataURL('image/png');
  // strip data:image/png;base64,
  safeSend({ type:'canvas_state', board_id:S.active,
             public:true, data: url.split(',')[1] });
}

function handleMsg(data) {
  const { type, board_id: bid } = data;

  // Ensure board exists
  if (bid && !S.boards[bid]) {
    S.boards[bid]  = newOffscreen();
    S.undoStk[bid] = [];
    S.redoStk[bid] = [];
    if (!S.order.includes(bid)) { S.order.push(bid); rebuildTabs(); }
  }

  if (type === 'draw') {
    const d = data.data;
    if (bid === S.active) strokeLine(ctx, d.x0, d.y0, d.x1, d.y1, d.col, d.sz);
    // also update offscreen
    const bctx = S.boards[bid]?.getContext('2d');
    if (bctx) strokeLine(bctx, d.x0, d.y0, d.x1, d.y1, d.col, d.sz);

  } else if (type === 'canvas_state' || type === 'board_state') {
    const img = new Image();
    img.onload = () => {
      const bctx = S.boards[bid]?.getContext('2d');
      if (bctx) { bctx.clearRect(0,0,CW,CH); bctx.drawImage(img,0,0); }
      if (bid === S.active) { ctx.clearRect(0,0,CW,CH); ctx.drawImage(img,0,0); }
    };
    img.src = 'data:image/png;base64,' + data.data;

  } else if (type === 'clear') {
    const bctx = S.boards[bid]?.getContext('2d');
    if (bctx) { bctx.clearRect(0,0,CW,CH); bctx.fillRect(0,0,CW,CH); }
    if (bid === S.active) { ctx.clearRect(0,0,CW,CH); ctx.fillRect(0,0,CW,CH); }
  }
}

// ──────────────────────────────────────────────────────────────────
//  Tool controls
// ──────────────────────────────────────────────────────────────────
function setTool(t) {
  if (t !== 'lasso' && S.lasso.mode !== 'idle') finalizeLasso(true);
  S.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  board.style.cursor =
    t === 'lasso'  ? 'default'    :
    t === 'eraser' ? 'cell'       : 'crosshair';
}

document.querySelectorAll('.tool-btn').forEach(b => {
  b.addEventListener('click', () => setTool(b.dataset.tool));
});

document.getElementById('size-sl').addEventListener('input', e => {
  S.brushSz = +e.target.value;
  document.getElementById('size-val').textContent = S.brushSz + ' px';
});

document.getElementById('btn-vis').addEventListener('click', () => {
  S.isPublic = !S.isPublic;
  const btn = document.getElementById('btn-vis');
  if (S.isPublic) {
    btn.textContent = '🌐 Public';
    btn.className   = 'tb-btn public';
  } else {
    btn.textContent = '🔒 Private';
    btn.className   = 'tb-btn private';
  }
});

document.getElementById('btn-save').addEventListener('click', () => {
  const a    = document.createElement('a');
  a.href     = board.toDataURL('image/png');
  a.download = `${S.active.replace(/\s+/g,'_')}_${Date.now()}.png`;
  a.click();
});

document.getElementById('btn-add').addEventListener('click', addBoard);

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm(`Clear all content on "${S.active}"?`)) return;
  pushUndo();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);
  snapshotToBoard();
  if (S.ws?.readyState === 1 && S.isPublic)
    safeSend({ type:'clear', board_id:S.active, public:true });
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

// ──────────────────────────────────────────────────────────────────
//  Keyboard shortcuts
// ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;

  if (ctrl && e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault(); redo(); return;
  }
  if (ctrl && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault(); undo(); return;
  }
  if (ctrl && (e.key === 'y' || e.key === 'Y')) {
    e.preventDefault(); redo(); return;
  }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (S.lasso.mode === 'dragging') lassoReset();
  }
  if (e.key === 'Escape') {
    if (S.lasso.mode === 'dragging') finalizeLasso(true);
    else if (S.lasso.mode === 'drawing') lassoReset();
  }
});

// ──────────────────────────────────────────────────────────────────
//  Canvas pointer events
// ──────────────────────────────────────────────────────────────────
board.addEventListener('mousedown',  onPointerDown);
board.addEventListener('mousemove',  onPointerMove);
board.addEventListener('mouseup',    onPointerUp);
board.addEventListener('mouseleave', onPointerUp);

// Prevent right-click menu on canvas
board.addEventListener('contextmenu', e => e.preventDefault());

// ──────────────────────────────────────────────────────────────────
//  Init
// ──────────────────────────────────────────────────────────────────
function init() {
  // White canvas default
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);

  initBoards();
  setColor('#e63946');
  drawWheel();

  // Kick off color preview
  document.getElementById('color-preview').style.background = S.color;

  connectWS();
}

init();
</script>
</body>
